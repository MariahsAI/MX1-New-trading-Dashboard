<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Launchpad · MX1 Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css" />
<style>
  .lp-hero {
    position: relative; padding: 44px 40px;
    border-radius: 16px; margin-bottom: 22px;
    background:
      radial-gradient(ellipse 700px 400px at 15% 20%, rgba(37, 99, 235, 0.32), transparent 70%),
      radial-gradient(ellipse 500px 300px at 90% 80%, rgba(16, 185, 129, 0.28), transparent 70%),
      linear-gradient(135deg, rgba(15, 32, 56, 0.95), rgba(6, 13, 28, 0.95));
    border: 1px solid var(--border); overflow: hidden;
  }
  .lp-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    mask: radial-gradient(ellipse at center, black 30%, transparent 80%);
    pointer-events: none;
  }
  .lp-hero-inner { display: grid; grid-template-columns: 1fr 380px; gap: 32px; align-items: center; position: relative; z-index: 1; }
  .lp-hero h1 {
    font-family: var(--font-display); font-size: 38px; font-weight: 800; letter-spacing: 1.5px;
    line-height: 1.05; margin-bottom: 14px;
  }
  .lp-hero h1 .grad { background: var(--grad-logo); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lp-hero p { color: var(--text-dim); font-size: 14px; line-height: 1.6; max-width: 560px; margin-bottom: 20px; }
  .lp-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 540px; }
  .lp-stat { padding: 14px; background: rgba(3, 7, 15, 0.55); border: 1px solid var(--border); border-radius: 10px; }
  .lp-stat .v { font-family: var(--font-mono); font-size: 18px; font-weight: 700; background: var(--grad-logo); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lp-stat .l { font-size: 10px; color: var(--text-faint); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 4px; font-weight: 600; }

  .featured-card {
    padding: 24px; background: rgba(3, 7, 15, 0.6); border: 1px solid var(--border-hi);
    border-radius: 14px; backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(37, 99, 235, 0.15);
  }
  .featured-card .chip { margin-bottom: 10px; }
  .featured-card h3 { font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
  .featured-card .tag { font-size: 11px; color: var(--text-faint); margin-bottom: 14px; }
  .featured-card .countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
  .featured-card .cd-box { padding: 10px 6px; text-align: center; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; }
  .featured-card .cd-box .n { font-family: var(--font-mono); font-weight: 800; font-size: 20px; color: var(--sky); text-shadow: 0 0 14px rgba(56, 189, 248, 0.4); }
  .featured-card .cd-box .l { font-size: 9px; color: var(--text-faint); letter-spacing: 0.8px; margin-top: 2px; text-transform: uppercase; }
  .featured-card .progress-wrap { margin-bottom: 12px; }
  .featured-card .progress-bar { height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
  .featured-card .progress-fill { height: 100%; background: var(--grad-logo); border-radius: 3px; }
  .featured-card .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 6px; }

  .lp-tabs {
    display: flex; gap: 6px; padding: 6px; background: var(--bg-1);
    border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 20px; max-width: 500px;
  }
  .lp-tabs button {
    flex: 1; padding: 11px 18px; font-size: 13px; font-weight: 600;
    color: var(--text-dim); border-radius: 8px; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .lp-tabs button .count { background: var(--bg-2); color: var(--text-dim); padding: 1px 7px; border-radius: 999px; font-size: 10px; font-family: var(--font-mono); }
  .lp-tabs button.active { color: white; background: var(--grad-logo); box-shadow: 0 2px 10px rgba(37, 99, 235, 0.3); }
  .lp-tabs button.active .count { background: rgba(3, 7, 15, 0.4); color: white; }

  .launches-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }
  .launch-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; transition: all 0.2s; cursor: pointer;
    display: flex; flex-direction: column;
  }
  .launch-card:hover { border-color: var(--border-hi); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(37, 99, 235, 0.18); }
  .launch-banner {
    height: 110px; position: relative; padding: 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .launch-banner::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(135deg, transparent 40%, rgba(3, 7, 15, 0.7)); }
  .launch-badge { padding: 4px 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.6px; border-radius: 999px; position: relative; z-index: 1; text-transform: uppercase; }
  .launch-badge.live { background: rgba(16, 185, 129, 0.25); color: var(--green-hi); border: 1px solid rgba(16, 185, 129, 0.5); animation: badgePulse 2s ease-in-out infinite; }
  .launch-badge.upcoming { background: rgba(56, 189, 248, 0.2); color: var(--sky); border: 1px solid rgba(56, 189, 248, 0.4); }
  .launch-badge.ended { background: var(--bg-2); color: var(--text-faint); border: 1px solid var(--border); }
  @keyframes badgePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } }
  .launch-hot { padding: 3px 8px; font-size: 10px; font-weight: 700; background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; border-radius: 6px; position: relative; z-index: 1; letter-spacing: 0.5px; }

  .launch-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
  .launch-head { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; margin-top: -36px; position: relative; z-index: 1; }
  .launch-logo { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-family: var(--font-display); font-size: 18px; border: 3px solid var(--bg-1); flex-shrink: 0; }
  .launch-name h3 { font-family: var(--font-display); font-size: 16px; letter-spacing: 0.8px; margin-bottom: 2px; }
  .launch-name .sym { font-family: var(--font-mono); color: var(--text-faint); font-size: 12px; }
  .launch-desc { color: var(--text-dim); font-size: 12.5px; line-height: 1.5; margin-bottom: 14px; min-height: 54px; }

  .launch-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 14px; font-size: 12px; }
  .launch-details .k { color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .launch-details .v { font-family: var(--font-mono); font-weight: 600; margin-top: 1px; }

  .launch-progress { margin-bottom: 12px; }
  .launch-progress .lbl-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  .launch-progress .bar { height: 5px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
  .launch-progress .fill { height: 100%; background: var(--grad-logo); border-radius: 3px; transition: width 0.3s; }

  .launch-cd { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 14px; }
  .launch-cd .box { padding: 6px 4px; text-align: center; background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; }
  .launch-cd .n { font-family: var(--font-mono); font-weight: 700; font-size: 14px; color: var(--sky); }
  .launch-cd .l { font-size: 8.5px; color: var(--text-faint); letter-spacing: 0.5px; margin-top: 1px; }

  .launch-cta { margin-top: auto; }
  .launch-cta button { width: 100%; padding: 11px; border-radius: 10px; font-weight: 700; font-size: 13px; letter-spacing: 0.4px; transition: all 0.2s; }
  .launch-cta button.participate { background: var(--grad-logo); color: white; box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35); }
  .launch-cta button.participate:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(37, 99, 235, 0.5); }
  .launch-cta button.notify { background: var(--bg-2); color: var(--text); border: 1px solid var(--border-hi); }
  .launch-cta button.disabled { background: var(--bg-2); color: var(--text-faint); cursor: not-allowed; }

  /* Participate modal */
  .participate-tokenomics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
  .participate-tokenomics .row { padding: 10px; background: var(--bg-2); border-radius: 8px; font-size: 12px; }
  .participate-tokenomics .row .k { color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .participate-tokenomics .row .v { font-family: var(--font-mono); font-weight: 700; margin-top: 3px; font-size: 14px; }
</style>
</head>
<body>

<script src="logo.js"></script>
<script src="shared.js"></script>
<script>initPage({ active: 'launchpad' });</script>

<main class="page">
  <section class="lp-hero">
    <div class="lp-hero-inner">
      <div>
        <h1>Launch the <span class="grad">next 100x</span> before anyone else.</h1>
        <p>MX1 Launchpad gives verified users early access to hand-picked token sales. Tiered allocations, transparent vesting, and on-chain proof of reserves on every deal.</p>
        <div class="lp-stats">
          <div class="lp-stat"><div class="v">132</div><div class="l">Projects Launched</div></div>
          <div class="lp-stat"><div class="v">$2.8B</div><div class="l">Total Raised</div></div>
          <div class="lp-stat"><div class="v">86x</div><div class="l">Avg. Peak ROI</div></div>
        </div>
      </div>
      <div class="featured-card" id="featuredCard"></div>
    </div>
  </section>

  <div class="lp-tabs" id="lpTabs">
    <button class="active" data-tab="live">🟢 Live <span class="count" id="cntLive">0</span></button>
    <button data-tab="upcoming">⏳ Upcoming <span class="count" id="cntUpcoming">0</span></button>
    <button data-tab="ended">✓ Ended <span class="count" id="cntEnded">0</span></button>
    <button data-tab="my">⭐ My Launches</button>
  </div>

  <div class="launches-grid" id="launchesGrid"></div>
</main>

<script>
  // ---------- Launches data ----------
  const GRADIENTS = [
    'linear-gradient(135deg, #2563eb, #10b981)',
    'linear-gradient(135deg, #7c3aed, #2563eb)',
    'linear-gradient(135deg, #f59e0b, #ef4444)',
    'linear-gradient(135deg, #06b6d4, #10b981)',
    'linear-gradient(135deg, #db2777, #6366f1)',
    'linear-gradient(135deg, #059669, #38bdf8)',
    'linear-gradient(135deg, #ec4899, #f59e0b)',
    'linear-gradient(135deg, #14b8a6, #8b5cf6)',
    'linear-gradient(135deg, #3b82f6, #14b8a6)',
    'linear-gradient(135deg, #8b5cf6, #ec4899)',
  ];

  const ICONS = ['Z','A','R','T','K','L','P','H','N','C','V','Q','M','S','B','G'];

  const PROJECTS = [
    { name: 'Zenith AI',       sym: 'ZEN',  desc: 'Decentralized compute layer for training foundation models on idle consumer GPUs. Backed by a16z, Paradigm.',               status: 'live',     hot: true,  end: 4*3600 + 23*60 },
    { name: 'Atlas Protocol',  sym: 'ATLS', desc: 'Modular L2 restaking platform with native shared sequencer and cross-rollup liquidity routing.',                                status: 'live',     hot: true,  end: 1*86400 + 8*3600 },
    { name: 'Ronin Network',   sym: 'RNN',  desc: 'Privacy-preserving DeFi stack with zero-knowledge proofs for institutional-grade compliance on permissionless rails.',         status: 'live',     hot: false, end: 2*86400 + 2*3600 },
    { name: 'Terra Quantum',   sym: 'TQM',  desc: 'Post-quantum cryptographic layer for bridge security. First audited implementation of CRYSTALS-Kyber on EVM chains.',          status: 'live',     hot: false, end: 14*3600 },
    { name: 'Kairos Finance',  sym: 'KAI',  desc: 'Real-world asset tokenization with on-chain treasury strategies. Currently holding $420M in tokenized US Treasuries.',         status: 'live',     hot: true,  end: 3*86400 + 5*3600 },
    { name: 'Lyra Games',      sym: 'LYRA', desc: 'AAA blockchain gaming studio with launch title already shipping 1.2M monthly active players on mainnet.',                      status: 'live',     hot: false, end: 5*3600 + 40*60 },

    { name: 'Prism DEX',       sym: 'PRSM', desc: 'Omni-chain orderbook DEX with shared liquidity across 14 networks. Sub-cent fees and MEV protection built in.',                status: 'upcoming', hot: true,  end: 6*86400 + 12*3600 },
    { name: 'Helios Storage',  sym: 'HELO', desc: 'Decentralized storage with cryptographic redundancy proofs. Targets 100x cheaper than AWS S3 by end of Q3.',                   status: 'upcoming', hot: false, end: 4*86400 + 6*3600 },
    { name: 'Nyx Oracle',      sym: 'NYX',  desc: 'Dark-pool price oracle network resistant to manipulation, using trusted hardware enclaves and threshold signatures.',           status: 'upcoming', hot: false, end: 9*86400 + 4*3600 },
    { name: 'Cerberus DAO',    sym: 'CERB', desc: 'Autonomous AI treasury manager that rebalances a $180M cross-chain portfolio using on-chain risk models.',                     status: 'upcoming', hot: true,  end: 12*86400 + 14*3600 },
    { name: 'Myriad Labs',     sym: 'MYRI', desc: 'Open-source AI model registry with on-chain provenance, royalty distribution, and compute-verified inference.',                status: 'upcoming', hot: false, end: 17*86400 },
    { name: 'Glyph Protocol',  sym: 'GLPH', desc: 'Cross-chain messaging with 1-block finality via a shared validator set. Native bridge for 22 EVM + 4 non-EVM chains.',          status: 'upcoming', hot: false, end: 21*86400 + 8*3600 },

    { name: 'Vortex Finance',  sym: 'VTX',  desc: 'Leveraged yield aggregator. Closed at $0.142, currently trading at $1.84. Peak ROI 12.9x.',                                   status: 'ended',    hot: false, end: 0, result: { listPrice: 0.142, peak: 1.84, roi: 12.9 } },
    { name: 'Orion Chain',     sym: 'ORI',  desc: 'High-throughput L1 with DAG consensus. IDO at $0.08, ATH $3.40. Currently $2.10.',                                            status: 'ended',    hot: false, end: 0, result: { listPrice: 0.08, peak: 3.40, roi: 42.5 } },
    { name: 'Beacon AI',       sym: 'BCN',  desc: 'On-device AI agents for DeFi. Launch $0.55, ATH $14.20. Hot launch of 2025 Q3.',                                              status: 'ended',    hot: false, end: 0, result: { listPrice: 0.55, peak: 14.20, roi: 25.8 } },
    { name: 'Spectre Finance', sym: 'SPCT', desc: 'Undercollateralized lending for on-chain corporates. Launch $0.45, current $0.38.',                                           status: 'ended',    hot: false, end: 0, result: { listPrice: 0.45, peak: 0.62, roi: 1.4 } },
  ];

  PROJECTS.forEach((p, i) => {
    p.id = i;
    p.gradient = GRADIENTS[i % GRADIENTS.length];
    p.icon = p.sym[0];
    p.hardCap = Math.floor(1 + Math.random() * 9) * 1000000;
    p.softCap = Math.floor(p.hardCap * 0.4);
    p.tokenPrice = (0.001 + Math.random() * 0.5).toFixed(3);
    p.raised = p.status === 'ended' ? p.hardCap : p.status === 'live' ? Math.floor(p.hardCap * (0.3 + Math.random() * 0.5)) : 0;
    p.participants = Math.floor(800 + Math.random() * 18000);
    p.vesting = ['5% TGE + 6m linear', '10% TGE + 9m linear', '15% TGE + 12m linear', '20% TGE + 6m cliff'][i % 4];
    p.initialMC = Math.floor(p.hardCap * (2 + Math.random() * 6));
    p.totalSupply = Math.floor(100 + Math.random() * 900) * 1000000;
  });

  // ---------- Featured card (top live) ----------
  const featured = PROJECTS.find(p => p.status === 'live' && p.hot) || PROJECTS[0];
  function renderFeatured() {
    const cd = breakDownSecs(featured.end);
    const pct = Math.min(100, (featured.raised / featured.hardCap) * 100);
    document.getElementById('featuredCard').innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
        <span class="chip green">🔴 LIVE NOW</span>
        <span style="color: var(--text-faint); font-size: 11px;">Featured</span>
      </div>
      <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 14px;">
        <div class="launch-logo" style="background: ${featured.gradient}; width: 46px; height: 46px; border: none;">${featured.icon}</div>
        <div>
          <h3>${featured.name}</h3>
          <div style="color: var(--text-faint); font-size: 11px; font-family: var(--font-mono);">$${featured.sym} · Raise $${fmtVol(featured.hardCap)}</div>
        </div>
      </div>
      <div class="countdown">
        <div class="cd-box"><div class="n">${String(cd.d).padStart(2,'0')}</div><div class="l">Days</div></div>
        <div class="cd-box"><div class="n" id="fHrs">${String(cd.h).padStart(2,'0')}</div><div class="l">Hours</div></div>
        <div class="cd-box"><div class="n" id="fMin">${String(cd.m).padStart(2,'0')}</div><div class="l">Min</div></div>
        <div class="cd-box"><div class="n" id="fSec">${String(cd.s).padStart(2,'0')}</div><div class="l">Sec</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct.toFixed(1)}%;"></div></div>
        <div class="progress-info"><span>Raised: <strong class="mono">$${fmtVol(featured.raised)}</strong></span><span>${pct.toFixed(0)}% of hard cap</span></div>
      </div>
      <button class="btn-primary" style="width: 100%;" onclick="openParticipate(${featured.id})">Participate Now →</button>
    `;
  }

  function breakDownSecs(total) {
    const d = Math.floor(total / 86400);
    const h = Math.floor((total % 86400) / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = Math.floor(total % 60);
    return { d, h, m, s };
  }

  // ---------- Tabs + grid ----------
  let currentTab = 'live';
  function render() {
    let list = [];
    if (currentTab === 'my') {
      const myList = JSON.parse(localStorage.getItem('mx1_launches') || '[]');
      list = myList.map(id => PROJECTS.find(p => p.id === id)).filter(Boolean);
    } else {
      list = PROJECTS.filter(p => p.status === currentTab);
    }

    document.getElementById('cntLive').textContent = PROJECTS.filter(p => p.status === 'live').length;
    document.getElementById('cntUpcoming').textContent = PROJECTS.filter(p => p.status === 'upcoming').length;
    document.getElementById('cntEnded').textContent = PROJECTS.filter(p => p.status === 'ended').length;

    if (!list.length) {
      document.getElementById('launchesGrid').innerHTML = `
        <div style="grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--text-faint);">
          ${currentTab === 'my' ? '<h3 style="font-family: var(--font-display); margin-bottom: 8px; color: var(--text-dim);">No participations yet</h3><p>Join a live launch to see it here.</p>' : 'No launches in this category.'}
        </div>
      `;
      return;
    }

    document.getElementById('launchesGrid').innerHTML = list.map(p => {
      const pct = p.status === 'ended' ? 100 : Math.min(100, (p.raised / p.hardCap) * 100);
      const cd = breakDownSecs(p.end);
      const badge = p.status === 'live' ? '<span class="launch-badge live">● LIVE</span>'
        : p.status === 'upcoming' ? '<span class="launch-badge upcoming">⏳ UPCOMING</span>'
        : '<span class="launch-badge ended">✓ ENDED</span>';
      const cta = p.status === 'live'
        ? `<button class="participate" onclick="openParticipate(${p.id})">Participate →</button>`
        : p.status === 'upcoming'
        ? `<button class="notify" onclick="toast('You\\'ll be notified when ${p.name} goes live.', 'success')">🔔 Remind Me</button>`
        : `<button class="disabled" disabled>Sale Ended · ${p.result ? p.result.roi + 'x ROI' : ''}</button>`;
      return `
        <div class="launch-card">
          <div class="launch-banner" style="background: ${p.gradient};">
            ${badge}
            ${p.hot ? '<span class="launch-hot">🔥 HOT</span>' : '<span></span>'}
          </div>
          <div class="launch-body">
            <div class="launch-head">
              <div class="launch-logo" style="background: ${p.gradient};">${p.icon}</div>
              <div class="launch-name">
                <h3>${p.name}</h3>
                <div class="sym">$${p.sym}</div>
              </div>
            </div>
            <div class="launch-desc">${p.desc}</div>
            <div class="launch-details">
              <div><div class="k">Token Price</div><div class="v">$${p.tokenPrice}</div></div>
              <div><div class="k">Hard Cap</div><div class="v">$${fmtVol(p.hardCap)}</div></div>
              <div><div class="k">Vesting</div><div class="v" style="font-size: 11px; font-weight: 500;">${p.vesting}</div></div>
              <div><div class="k">Participants</div><div class="v">${p.participants.toLocaleString()}</div></div>
            </div>
            ${p.status === 'live' || p.status === 'ended' ? `
              <div class="launch-progress">
                <div class="lbl-row"><span>$${fmtVol(p.raised)} raised</span><span>${pct.toFixed(0)}%</span></div>
                <div class="bar"><div class="fill" style="width: ${pct.toFixed(1)}%;"></div></div>
              </div>
            ` : ''}
            ${p.status !== 'ended' && p.end > 0 ? `
              <div class="launch-cd">
                <div class="box"><div class="n">${String(cd.d).padStart(2,'0')}</div><div class="l">DAYS</div></div>
                <div class="box"><div class="n">${String(cd.h).padStart(2,'0')}</div><div class="l">HRS</div></div>
                <div class="box"><div class="n">${String(cd.m).padStart(2,'0')}</div><div class="l">MIN</div></div>
                <div class="box"><div class="n">${String(cd.s).padStart(2,'0')}</div><div class="l">SEC</div></div>
              </div>
            ` : ''}
            <div class="launch-cta">${cta}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  document.querySelectorAll('#lpTabs button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#lpTabs button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentTab = b.dataset.tab;
      render();
    });
  });

  // Live countdown
  setInterval(() => {
    PROJECTS.forEach(p => { if (p.end > 0) p.end = Math.max(0, p.end - 1); });
    render();
    renderFeatured();
  }, 1000);

  // ---------- Participate modal ----------
  window.openParticipate = function(id) {
    if (!MX1.session) {
      toast('Please sign in to participate.', 'error');
      setTimeout(() => location.href = 'login.html?next=launchpad.html', 800);
      return;
    }
    const p = PROJECTS.find(x => x.id === id);
    const pct = Math.min(100, (p.raised / p.hardCap) * 100);
    const body = `
      <div style="display: flex; gap: 14px; align-items: center; margin-bottom: 16px;">
        <div class="launch-logo" style="background: ${p.gradient}; width: 56px; height: 56px; border: none;">${p.icon}</div>
        <div>
          <h3 style="font-family: var(--font-display); letter-spacing: 0.5px; font-size: 18px;">${p.name} <span style="color: var(--text-faint); font-family: var(--font-mono); font-size: 13px; font-weight: 500;">$${p.sym}</span></h3>
          <div style="color: var(--text-dim); font-size: 12px; margin-top: 4px;">${p.desc}</div>
        </div>
      </div>

      <div class="participate-tokenomics">
        <div class="row"><div class="k">Token Price</div><div class="v">$${p.tokenPrice}</div></div>
        <div class="row"><div class="k">Total Supply</div><div class="v">${fmtVol(p.totalSupply)}</div></div>
        <div class="row"><div class="k">Hard Cap</div><div class="v">$${fmtVol(p.hardCap)}</div></div>
        <div class="row"><div class="k">Initial MC</div><div class="v">$${fmtVol(p.initialMC)}</div></div>
        <div class="row"><div class="k">Vesting</div><div class="v" style="font-size: 12px;">${p.vesting}</div></div>
        <div class="row"><div class="k">Raised</div><div class="v">$${fmtVol(p.raised)} (${pct.toFixed(0)}%)</div></div>
      </div>

      <div class="field" style="margin-top: 14px;">
        <label>Commit amount (USDT)</label>
        <input type="number" id="commitAmt" value="100" min="10" max="5000" />
        <div style="display: flex; gap: 6px; margin-top: 6px;">
          ${[50, 100, 500, 1000, 5000].map(v => `<button class="btn-ghost" style="flex:1;padding:6px;font-size:11px;" onclick="document.getElementById('commitAmt').value=${v};updateCommit(${p.tokenPrice})">$${v}</button>`).join('')}
        </div>
      </div>
      <div style="margin-top: 10px; padding: 12px; background: var(--bg-2); border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px;">
        <div><span style="color: var(--text-faint);">You'll receive:</span></div>
        <div style="text-align: right; font-family: var(--font-mono); font-weight: 700; color: var(--sky);" id="willReceive">${(100 / p.tokenPrice).toFixed(0)} ${p.sym}</div>
        <div><span style="color: var(--text-faint);">Your tier:</span></div>
        <div style="text-align: right; font-weight: 600; color: var(--amber);">Gold · 2x allocation</div>
      </div>

      <div style="margin-top: 14px; padding: 10px 12px; background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.25); border-radius: 8px; font-size: 11px; color: var(--amber); line-height: 1.5;">
        ⚠ Participation involves risk. Tokens are subject to vesting. Do your own research. MX1 does not endorse any project's long-term performance.
      </div>
    `;
    const m = modal({
      title: `Participate in ${p.name}`,
      body, width: 560,
      actions: [
        { label: 'Cancel', class: 'btn-ghost' },
        { label: `Commit Now`, class: 'btn-primary', onClick: close => {
          const amt = parseFloat(document.getElementById('commitAmt').value) || 0;
          if (amt < 10) { toast('Minimum commit is $10.', 'error'); return; }
          close();
          toast(`Committed $${amt} to ${p.name}. You'll receive ${(amt / p.tokenPrice).toFixed(0)} ${p.sym} at TGE.`, 'success', 4500);
          const saved = JSON.parse(localStorage.getItem('mx1_launches') || '[]');
          if (!saved.includes(p.id)) { saved.push(p.id); localStorage.setItem('mx1_launches', JSON.stringify(saved)); }
          p.raised += amt;
          render();
        }}
      ]
    });

    window.updateCommit = function(price) {
      const amt = parseFloat(document.getElementById('commitAmt').value) || 0;
      document.getElementById('willReceive').textContent = `${(amt / price).toFixed(0)} ${p.sym}`;
    };
    m.el.querySelector('#commitAmt').addEventListener('input', () => window.updateCommit(p.tokenPrice));
  };

  renderFeatured();
  render();
</script>
</body>
</html>
